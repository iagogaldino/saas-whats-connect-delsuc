name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared on Runner
        run: |
          sudo curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo chmod +x /usr/local/bin/cloudflared

      - name: SSH deploy on target host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_HEALTH_URL: "http://localhost:3001/health"
        run: |
          set -euo pipefail
          
          # Configuração da chave SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Execução remota em uma linha única para evitar erro de 'unknown option'
          ssh -i ~/.ssh/deploy_key -o "StrictHostKeyChecking=no" -o "ProxyCommand=/usr/local/bin/cloudflared access ssh --hostname %h" "${SSH_USER}@${SSH_HOST}" env DEPLOY_PATH="$DEPLOY_PATH" HEALTH_URL="$BACKEND_HEALTH_URL" bash -s <<'REMOTE'
          
          set -euo pipefail
          echo "✅ Conexão estabelecida com o Chromebook!"

          # 1. Atualizar repositório
          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull origin main

          # 2. Deploy Docker
          cd backend
          
          # Limpeza preventiva (Otimizado para 4GB RAM)
          PORT_CONTAINERS="$(docker ps -q --filter publish=3001)"
          if [ -n "$PORT_CONTAINERS" ]; then
            docker rm -f $PORT_CONTAINERS
          fi

          # Build e Up
          docker compose build --pull api
          docker compose up -d --remove-orphans api

          # 3. Health Check
          echo "Aguardando API..."
          for i in {1..20}; do
            if curl --fail --silent "$HEALTH_URL" > /dev/null; then
              echo "✅ Backend online!"
              docker image prune -f
              exit 0
            fi
            sleep 5
          done

          echo "❌ Falha no Health Check."
          docker compose logs --tail=50 api
          exit 1
          
          REMOTE