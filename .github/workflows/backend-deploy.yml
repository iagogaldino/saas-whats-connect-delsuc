name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    # Requer runner com este label em Settings → Actions → Runners (nome != label; criar label "delsuc-ubunto").
    runs-on: [self-hosted, delsuc-ubunto]
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy backend (local path + SSH key)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BACKEND_HEALTH_URL: "http://localhost:3001/health"
        run: |
          set -euo pipefail

          : "${SSH_KEY:?Secret SSH_KEY (chave privada OpenSSH) obrigatorio}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${GITHUB_REPOSITORY:?}"

          DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s:/*$::')"

          KEY="${RUNNER_TEMP:-/tmp}/gha_gitdeploy_key.$$"
          umask 077
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' >"$KEY"
          chmod 600 "$KEY"

          if ! grep -qiE '^-----BEGIN .+PRIVATE KEY-----' "$KEY"; then
            echo "::error::SSH_KEY tem de ser a chave PRIVADA completa (linhas BEGIN/END). Nao use a .pub aqui."
            exit 1
          fi

          KEY_ABS="$(readlink -f "$KEY" 2>/dev/null || realpath "$KEY" 2>/dev/null || echo "$KEY")"

          touch ~/.ssh/known_hosts
          if ! ssh-keygen -F github.com -f ~/.ssh/known_hosts >/dev/null 2>&1; then
            ssh-keyscan -t ed25519,rsa github.com >>~/.ssh/known_hosts 2>/dev/null || true
          fi
          chmod 644 ~/.ssh/known_hosts

          # Sem /dev/null o ssh pode ler ~/.ssh/config e ignorar a chave do job.
          SSH_CMD="ssh -F /dev/null -i ${KEY_ABS} -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          export GIT_SSH_COMMAND="$SSH_CMD"

          git_ssh() {
            GIT_SSH_COMMAND="$SSH_CMD" git -c core.sshCommand="$SSH_CMD" "$@"
          }

          echo "A testar autenticacao SSH com git@github.com ..."
          set +e
          ssh_test="$(ssh -F /dev/null -i "$KEY_ABS" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o BatchMode=yes -T git@github.com 2>&1)"
          set -e
          echo "$ssh_test"
          if echo "$ssh_test" | grep -qi 'Permission denied (publickey)'; then
            echo "::error::GitHub rejeitou a chave. Em github.com/${GITHUB_REPOSITORY} > Settings > Deploy keys, adicione a CHAVE PUBLICA que faz par com SSH_KEY (ou use SSH keys na sua conta GitHub)."
            exit 1
          fi

          ORIGIN_SSH="git@github.com:${GITHUB_REPOSITORY}.git"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_PATH")"
            if [ -e "$DEPLOY_PATH" ] && [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "::error::DEPLOY_PATH existe mas nao e um repositorio git."
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Primeira execucao: git clone SSH -> DEPLOY_PATH"
              git_ssh clone "$ORIGIN_SSH" "$DEPLOY_PATH"
            fi
          fi

          git_ssh -C "$DEPLOY_PATH" remote set-url origin "$ORIGIN_SSH"

          cd "$DEPLOY_PATH"
          git_ssh fetch --all --prune
          git_ssh checkout main
          git_ssh pull --ff-only origin main

          rm -f "$KEY"

          cd backend

          PORT_CONTAINERS="$(docker ps -q --filter publish=3001)"
          if [ -n "$PORT_CONTAINERS" ]; then
            docker rm -f $PORT_CONTAINERS
          fi

          docker compose build --pull api
          docker compose up -d --remove-orphans api

          echo "Aguardando API..."
          for i in {1..20}; do
            if curl --fail --silent "${BACKEND_HEALTH_URL}" >/dev/null; then
              echo "Backend health check passou."
              docker image prune -f
              exit 0
            fi
            sleep 5
          done

          echo "Falha no health check."
          docker compose logs --tail=50 api
          exit 1
