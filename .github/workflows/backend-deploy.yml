name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    # Runner self-hosted no mesmo host que DEPLOY_PATH. Git/GitHub apenas com SSH_KEY (deploy key ou chave de conta).
    runs-on: self-hosted
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy backend (local path + SSH key)
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BACKEND_HEALTH_URL: "http://localhost:3001/health"
        run: |
          set -euo pipefail

          : "${SSH_KEY:?Crie o secret SSH_KEY com a chave privada OpenSSH correspondente à pública registada no GitHub (Deploy key ou SSH key na conta)}"
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${GITHUB_REPOSITORY:?}"

          DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s:/*$::')"

          KEY="${RUNNER_TEMP:-/tmp}/gha_gitdeploy_key.$$"
          umask 077
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' >"$KEY"

          if ! grep -Fq 'github.com' ~/.ssh/known_hosts 2>/dev/null; then
            ssh-keyscan -t ed25519,rsa github.com >>~/.ssh/known_hosts 2>/dev/null || true
          fi
          chmod 644 ~/.ssh/known_hosts 2>/dev/null || true

          export GIT_SSH_COMMAND="ssh -i $KEY -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"

          ORIGIN_SSH="git@github.com:${GITHUB_REPOSITORY}.git"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_PATH")"
            if [ -e "$DEPLOY_PATH" ] && [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "::error::DEPLOY_PATH existe mas não é um repositório git."
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Primeira execução: git clone SSH -> $DEPLOY_PATH"
              git clone "$ORIGIN_SSH" "$DEPLOY_PATH"
            fi
          fi

          git -C "$DEPLOY_PATH" remote set-url origin "$ORIGIN_SSH"

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          rm -f "$KEY"

          cd backend

          PORT_CONTAINERS="$(docker ps -q --filter publish=3001)"
          if [ -n "$PORT_CONTAINERS" ]; then
            docker rm -f $PORT_CONTAINERS
          fi

          docker compose build --pull api
          docker compose up -d --remove-orphans api

          echo "Aguardando API..."
          for i in {1..20}; do
            if curl --fail --silent "${BACKEND_HEALTH_URL}" >/dev/null; then
              echo "Backend health check passou."
              docker image prune -f
              exit 0
            fi
            sleep 5
          done

          echo "Falha no health check."
          docker compose logs --tail=50 api
          exit 1
