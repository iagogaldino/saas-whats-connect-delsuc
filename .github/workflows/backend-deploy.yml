name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared on runner
        run: |
          set -euo pipefail
          sudo curl -fsSL --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo chmod +x /usr/local/bin/cloudflared
          /usr/local/bin/cloudflared --version

      - name: SSH deploy on target host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_HEALTH_URL: "http://localhost:3001/health"
        run: |
          set -euo pipefail

          : "${SSH_HOST:?SSH_HOST secret is required}"
          : "${SSH_USER:?SSH_USER secret is required}"
          : "${SSH_KEY:?SSH_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Inline -o ProxyCommand="... --hostname %h" faz o ssh tratar "--" como opção própria.
          # Usar ~/.ssh/config é o caminho estável para vários argumentos.
          cat > ~/.ssh/config <<EOF
          Host deploy-chromebook
            HostName ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
          EOF
          chmod 600 ~/.ssh/config

          ssh deploy-chromebook env DEPLOY_PATH="$DEPLOY_PATH" HEALTH_URL="$BACKEND_HEALTH_URL" bash -s <<'REMOTE'

          set -euo pipefail
          echo "Conexão estabelecida com o Chromebook"

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull origin main

          cd backend

          PORT_CONTAINERS="$(docker ps -q --filter publish=3001)"
          if [ -n "$PORT_CONTAINERS" ]; then
            docker rm -f $PORT_CONTAINERS
          fi

          docker compose build --pull api
          docker compose up -d --remove-orphans api

          echo "Aguardando API..."
          for i in {1..20}; do
            if curl --fail --silent "$HEALTH_URL" > /dev/null; then
              echo "Backend health check passou."
              docker image prune -f
              exit 0
            fi
            sleep 5
          done

          echo "Falha no health check."
          docker compose logs --tail=50 api
          exit 1

          REMOTE
