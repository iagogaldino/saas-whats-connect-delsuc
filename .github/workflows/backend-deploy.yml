name: Backend Deploy

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    # Runner self-hosted no MESMO host onde existe DEPLOY_PATH (sem SSH nem SSH_KEY).
    runs-on: self-hosted
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy backend (local repo path)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_HEALTH_URL: "http://localhost:3001/health"
        run: |
          set -euo pipefail
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${GITHUB_REPOSITORY:?}"
          GIT_TOKEN="${GIT_READ_TOKEN:-$GITHUB_TOKEN}"
          : "${GIT_TOKEN:?Use github.token ou crie o secret GIT_READ_TOKEN (PAT com scope Contents read no repo)}"

          DEPLOY_PATH="$(printf '%s' "$DEPLOY_PATH" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s:/*$::')"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            mkdir -p "$(dirname "$DEPLOY_PATH")"
            if [ -e "$DEPLOY_PATH" ] && [ ! -d "$DEPLOY_PATH/.git" ]; then
              echo "::error::DEPLOY_PATH existe no disco mas não é um repositório git (falta .git). Escolha outro caminho ou apague a pasta e reponha o secret."
              exit 1
            fi
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "A clonar em DEPLOY_PATH (primeira execução)..."
              git clone "https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$DEPLOY_PATH"
            fi
          fi

          HEALTH_URL="${BACKEND_HEALTH_URL}"
          REMOTE_ORIG="$(cd "$DEPLOY_PATH" && git remote get-url origin)"
          trap 'git -C "$DEPLOY_PATH" remote set-url origin "$REMOTE_ORIG"' EXIT
          git -C "$DEPLOY_PATH" remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          cd backend

          PORT_CONTAINERS="$(docker ps -q --filter publish=3001)"
          if [ -n "$PORT_CONTAINERS" ]; then
            docker rm -f $PORT_CONTAINERS
          fi

          docker compose build --pull api
          docker compose up -d --remove-orphans api

          echo "Aguardando API..."
          for i in {1..20}; do
            if curl --fail --silent "$HEALTH_URL" > /dev/null; then
              echo "Backend health check passou."
              docker image prune -f
              exit 0
            fi
            sleep 5
          done

          echo "Falha no health check."
          docker compose logs --tail=50 api
          exit 1
