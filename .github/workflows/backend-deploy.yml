name: Backend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared on Runner
        run: |
          sudo curl -L --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo chmod +x /usr/local/bin/cloudflared

      - name: SSH deploy on target host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          BACKEND_HEALTH_URL: "http://localhost:3001/health"
        run: |
          set -euo pipefail
          
          # Configuração da chave SSH
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Execução remota formatada para evitar erros de opção desconhecida
          ssh -i ~/.ssh/deploy_key \
            -o "StrictHostKeyChecking=no" \
            -o "ProxyCommand=/usr/local/bin/cloudflared access ssh --hostname %h" \
            "${SSH_USER}@${SSH_HOST}" \
            env DEPLOY_PATH="$DEPLOY_PATH" HEALTH_URL="$BACKEND_HEALTH_URL" bash -s <<'REMOTE'
          
          set -euo pipefail
          echo "✅ Conectado ao Chromebook. Iniciando deploy..."

          # 1. Atualizar código
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "❌ Erro: DEPLOY_PATH não encontrado no servidor."
            exit 1
          fi

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull origin main

          # 2. Preparar ambiente Docker
          cd backend
          
          # Limpeza de containers antigos na porta 3001
          PORT_CONTAINERS="$(docker ps -q --filter publish=3001)"
          if [ -n "$PORT_CONTAINERS" ]; then
            echo "Limpando containers antigos..."
            docker rm -f $PORT_CONTAINERS
          fi

          # 3. Build e Up (Otimizado para Celeron N4020 com 4GB RAM)
          echo "Iniciando Build e Up do Docker..."
          docker compose build --pull api
          docker compose up -d --remove-orphans api

          # 4. Health Check Loop
          echo "Aguardando inicialização da API em $HEALTH_URL..."
          for i in {1..20}; do
            if curl --fail --silent "$HEALTH_URL" > /dev/null; then
              echo "✅ Backend health check passou!"
              
              # Limpa imagens antigas para poupar o SSD de 64GB
              docker image prune -f
              exit 0
            fi
            echo "Tentativa $i/20: API ainda não disponível (aguardando 5s)..."
            sleep 5
          done

          echo "❌ Erro: API não respondeu dentro do tempo esperado."
          docker compose logs --tail=50 api
          exit 1
          
          REMOTE