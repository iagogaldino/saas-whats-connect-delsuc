name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Add deploy host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy frontend over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          FRONTEND_HEALTH_URL: ${{ vars.FRONTEND_HEALTH_URL }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST is required}"
          : "${DEPLOY_USER:?DEPLOY_USER is required}"
          : "${DEPLOY_PASSWORD:?DEPLOY_PASSWORD is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          PORT="${DEPLOY_PORT:-22}"
          HEALTH_URL="${FRONTEND_HEALTH_URL:-http://127.0.0.1:4173/}"

          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=yes -p "$PORT" "${DEPLOY_USER}@${DEPLOY_HOST}" "DEPLOY_PATH='${DEPLOY_PATH}' HEALTH_URL='${HEALTH_URL}' bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          cd frontend
          docker compose build --pull web
          docker compose up -d --remove-orphans web
          docker compose ps

          curl --fail --silent --show-error "$HEALTH_URL" > /dev/null
          EOF
