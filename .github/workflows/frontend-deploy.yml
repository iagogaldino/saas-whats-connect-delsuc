name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend to production
    runs-on: self-hosted
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy frontend on self-hosted runner
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          FRONTEND_HEALTH_URL: ${{ vars.FRONTEND_HEALTH_URL }}
        run: |
          set -euo pipefail
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          HEALTH_URL="${FRONTEND_HEALTH_URL:-http://127.0.0.1:4173/}"

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          cd frontend
          docker compose build --pull web
          docker compose up -d --remove-orphans web
          docker compose ps

          curl --fail --silent --show-error "$HEALTH_URL" > /dev/null
