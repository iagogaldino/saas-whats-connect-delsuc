name: Frontend Deploy

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend to production
    runs-on: self-hosted
    timeout-minutes: 20
    environment: production

    steps:
      - name: Deploy frontend (local repo path)
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          FRONTEND_HEALTH_URL: ${{ vars.FRONTEND_HEALTH_URL }}
        run: |
          set -euo pipefail
          : "${DEPLOY_PATH:?DEPLOY_PATH secret is required}"
          : "${GITHUB_TOKEN:?GITHUB_TOKEN indisponível; verifique permissões do workflow}"

          HEALTH_URL="${FRONTEND_HEALTH_URL:-http://127.0.0.1:4173/}"
          REMOTE_ORIG="$(cd "$DEPLOY_PATH" && git remote get-url origin)"
          trap 'git -C "$DEPLOY_PATH" remote set-url origin "$REMOTE_ORIG"' EXIT
          git -C "$DEPLOY_PATH" remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main

          cd frontend

          docker compose build --pull web
          docker compose up -d --remove-orphans web
          docker compose ps

          echo "Health check frontend..."
          if curl --fail --silent "$HEALTH_URL" > /dev/null; then
            echo "Frontend health check passou."
            docker image prune -f
            exit 0
          fi

          echo "Frontend health check falhou."
          docker compose logs --tail=80 web || true
          exit 1
