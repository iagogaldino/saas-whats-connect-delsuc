name: Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend to production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared on runner
        run: |
          set -euo pipefail
          sudo curl -fsSL --output /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          sudo chmod +x /usr/local/bin/cloudflared
          /usr/local/bin/cloudflared --version

      - name: SSH deploy on target host
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          FRONTEND_HEALTH_URL: ${{ vars.FRONTEND_HEALTH_URL }}
        run: |
          set -euo pipefail

          : "${SSH_HOST:?SSH_HOST secret is required}"
          : "${SSH_USER:?SSH_USER secret is required}"
          : "${SSH_KEY:?SSH_KEY secret is required}"
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          HEALTH_URL="${FRONTEND_HEALTH_URL:-http://127.0.0.1:4173/}"

          SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '\r' | head -n1 | awk '{print $1}')"
          SSH_USER="$(printf '%s' "$SSH_USER" | tr -d '\r' | head -n1 | awk '{
            start = 1
            if (tolower($1) == "user" && NF > 1) start = 2
            print $start
          }')"
          : "${SSH_USER:?SSH_USER ficou vazio após sanitizar (use só o login, ex.: iago)}"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          {
            printf '%s\n' "Host deploy-chromebook"
            printf '%s\n' "  HostName ${SSH_HOST}"
            printf '%s\n' "  User ${SSH_USER}"
            printf '%s\n' "  IdentityFile ~/.ssh/deploy_key"
            printf '%s\n' "  IdentitiesOnly yes"
            printf '%s\n' "  StrictHostKeyChecking no"
            printf '%s\n' "  ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

          ssh deploy-chromebook env DEPLOY_PATH="$DEPLOY_PATH" HEALTH_URL="$HEALTH_URL" bash -s <<'REMOTE'

          set -euo pipefail
          echo "Iniciando deploy em: $DEPLOY_PATH"

          cd "$DEPLOY_PATH"
          git fetch --all --prune
          git checkout main
          git pull origin main

          cd frontend

          docker compose build --pull web
          docker compose up -d --remove-orphans web
          docker compose ps

          echo "Health check frontend..."
          if curl --fail --silent "$HEALTH_URL" > /dev/null; then
            echo "Frontend health check passou."
            docker image prune -f
            exit 0
          fi

          echo "Frontend health check falhou."
          docker compose logs --tail=80 web || true
          exit 1

          REMOTE
